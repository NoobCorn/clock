<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clock</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter&family=Orbitron&family=Playfair+Display&family=Roboto+Mono&family=Space+Mono&family=Poppins&family=Montserrat&family=Raleway&family=Courier+Prime&family=Lora&display=swap');

:root{
    --background:#0f172a;
    --background2:#1e293b;
    --text:#ffffff;
    --glass:rgba(255,255,255,.12);
}


*{
    box-sizing:border-box;
}


body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        var(--background),
        var(--background2)
    );

    color:var(--text);
    font-family:Inter,sans-serif;

    transition:
        background 1s,
        color 1s;
}


.container{
    text-align:center;
    transition:opacity 1.2s, transform 1.2s;
}


.clock{
    font-size:clamp(70px,14vw,190px);
    font-weight:600;
    letter-spacing:-5px;

    transition:
    font-family .5s,
    transform .5s;
}


.date{
    margin-top:15px;
    font-size:24px;
    opacity:.65;
}


.hidden{
    display:none;
}


.dim{
    opacity:.12;
    transform:scale(.98);
}


/* Top controls */

.controls{

    position:fixed;
    top:25px;
    right:25px;

    opacity:0;

    transition:.5s;
}


body.active .controls{
    opacity:1;
}



.icon-btn{

    width:52px;
    height:52px;

    border-radius:50%;

    border:none;

    color:white;

    background:var(--glass);

    backdrop-filter:blur(20px);

    font-size:22px;

    cursor:pointer;

    transition:.3s;
}


.icon-btn:hover{
    transform:scale(1.08);
}



/* Settings */

.panel{

    position:fixed;

    right:-420px;

    top:0;

    width:380px;

    height:100%;

    padding:35px;

    background:
    rgba(0,0,0,.35);

    backdrop-filter:blur(30px);

    transition:.5s;

    overflow:auto;

}


.panel.open{
    right:0;
}



.card{

    background:
    rgba(255,255,255,.08);

    border-radius:18px;

    padding:18px;

    margin-bottom:15px;

}



label{
    display:flex;
    justify-content:space-between;
    align-items:center;
}



select,
input{

    margin-top:10px;

    width:100%;

    padding:12px;

    border-radius:14px;

    border:none;

}



/* Bottom mode buttons */

.modes{

    position:fixed;

    bottom:35px;

    display:flex;

    gap:12px;

}



.mode-btn{

    border:none;

    padding:12px 22px;

    border-radius:30px;

    background:var(--glass);

    color:white;

    backdrop-filter:blur(20px);

    cursor:pointer;

    transition:.3s;

}


.mode-btn:hover{

    transform:translateY(-3px);

}



.extra{

    font-size:40px;

    margin-top:20px;

}

</style>
</head>
<body>

<div class="controls">
    <button class="icon-btn" onclick="openSettings()">⚙</button>
</div>


<div class="container" id="main">

    <div class="clock" id="clock">
        12:00:00
    </div>

    <div class="date hidden" id="date">
        Monday, January 1
    </div>

    <div class="extra" id="extra"></div>

</div>



<!-- Modes -->

<div class="modes">

    <button class="mode-btn" onclick="changeMode('clock')">
        Clock
    </button>

    <button class="mode-btn" onclick="changeMode('timer')">
        Timer
    </button>

    <button class="mode-btn" onclick="changeMode('stopwatch')">
        Stopwatch
    </button>

</div>





<!-- Settings Panel -->

<div class="panel" id="panel">

<h2>Settings</h2>



<div class="card">

<h3>Appearance</h3>


<label>
Theme

<select id="theme">

<option value="midnight">
Midnight
</option>

<option value="ocean">
Ocean
</option>

<option value="sunset">
Sunset
</option>

<option value="forest">
Forest
</option>

<option value="purple">
Purple
</option>

<option value="clean">
Clean
</option>

<option value="rose">
Rose
</option>

<option value="blue">
Blue
</option>

<option value="gold">
Gold
</option>

<option value="dark">
Dark
</option>

</select>

</label>

</div>





<div class="card">

<h3>Font</h3>


<select id="font">

<option>
Inter
</option>

<option>
Orbitron
</option>

<option>
Playfair Display
</option>

<option>
Roboto Mono
</option>

<option>
Space Mono
</option>

<option>
Poppins
</option>

<option>
Montserrat
</option>

<option>
Raleway
</option>

<option>
Courier Prime
</option>

<option>
Lora
</option>


</select>


</div>





<div class="card">

<h3>Time</h3>


<label>

12 / 24 Hour

<select id="format">

<option value="12">
12 Hour
</option>

<option value="24">
24 Hour
</option>

</select>

</label>



<label>

Seconds

<input 
type="checkbox"
id="seconds"
checked>

</label>



<label>

Show Date

<input 
type="checkbox"
id="showDate">

</label>



</div>






<div class="card">

<h3>Timezone</h3>


<select id="timezone">

<option value="local">
Local Time
</option>


<option value="America/New_York">
New York
</option>


<option value="Europe/London">
London
</option>


<option value="Europe/Paris">
Paris
</option>


<option value="Asia/Tokyo">
Tokyo
</option>


<option value="Asia/Shanghai">
Shanghai
</option>


<option value="Australia/Sydney">
Sydney
</option>


</select>


</div>







<div class="card">

<h3>Timer</h3>


<input 
type="number"
id="timerMinutes"
placeholder="Minutes">


<button 
class="mode-btn"
onclick="startTimer()">

Start Timer

</button>


</div>






<div class="card">

<h3>Controls</h3>


<button 
class="mode-btn"
onclick="closeSettings()">

Close

</button>


</div>


</div>





<script>
const clock = document.getElementById("clock");
const date = document.getElementById("date");
const panel = document.getElementById("panel");
const main = document.getElementById("main");
const extra = document.getElementById("extra");


let mode = "clock";

let settings = JSON.parse(localStorage.getItem("clockSettings")) || {

    theme:"midnight",
    font:"Inter",
    format:"12",
    seconds:true,
    showDate:false,
    timezone:"local"

};



let timer = 0;
let stopwatch = 0;
let running = false;

let idleTimer;



// --------------------
// Settings
// --------------------


function save(){

    localStorage.setItem(
        "clockSettings",
        JSON.stringify(settings)
    );

}



function openSettings(){

    panel.classList.add("open");

}



function closeSettings(){

    panel.classList.remove("open");

}



// --------------------
// Activity Fade
// --------------------


function wake(){

    document.body.classList.add("active");

    main.classList.remove("dim");


    clearTimeout(idleTimer);


    idleTimer=setTimeout(()=>{

        main.classList.add("dim");

        document.body.classList.remove("active");

    },5000);

}


document.addEventListener(
"mousemove",
wake
);


document.addEventListener(
"keydown",
wake
);



wake();




// --------------------
// Clock
// --------------------


function updateClock(){


if(mode!=="clock") return;


let now = new Date();



let options={};



if(settings.timezone!=="local"){

    options.timeZone=settings.timezone;

}




if(settings.format==="12"){


clock.innerHTML =
new Intl.DateTimeFormat(
"en-US",
{
hour:"numeric",
minute:"2-digit",
second:
settings.seconds
?
"2-digit"
:
undefined,
hour12:true,
...options
}
)
.format(now);



}else{


let parts =
new Intl.DateTimeFormat(
"en-US",
{
hour:"2-digit",
minute:"2-digit",
second:
settings.seconds
?
"2-digit"
:
undefined,
hour12:false,
...options
}
)
.format(now);



clock.innerHTML=parts;



}



if(settings.showDate){


date.classList.remove("hidden");


date.innerHTML =
new Intl.DateTimeFormat(
"en-US",
{
weekday:"long",
month:"long",
day:"numeric",
...options
}
)
.format(now);



}else{


date.classList.add("hidden");


}



document.title=clock.innerText;



}





// --------------------
// Timer
// --------------------


function startTimer(){


let mins =
Number(
document.getElementById("timerMinutes").value
);



if(mins){

timer = mins*60;

mode="timer";

}



}



function updateTimer(){


if(mode!=="timer") return;


if(timer>0 && running){

timer--;

}



let m=Math.floor(timer/60);

let s=timer%60;



extra.innerHTML =
`${m}:${String(s).padStart(2,"0")}`;



document.title =
`Timer ${extra.innerText}`;



}





// --------------------
// Stopwatch
// --------------------


function updateStopwatch(){


if(mode!=="stopwatch") return;


if(running){

stopwatch++;

}



let m=Math.floor(stopwatch/60);

let s=stopwatch%60;


extra.innerHTML =
`${m}:${String(s).padStart(2,"0")}`;


document.title =
`Stopwatch ${extra.innerText}`;



}





function changeMode(newMode){


mode=newMode;


extra.innerHTML="";


if(mode==="clock"){

updateClock();

}


}





// --------------------
// Controls
// --------------------


theme.onchange=function(){

settings.theme=this.value;

applyTheme();

save();

};



font.onchange=function(){

settings.font=this.value;

document.body.style.fontFamily=
this.value;


save();


};



format.onchange=function(){

settings.format=this.value;

save();


};



seconds.onchange=function(){

settings.seconds=this.checked;

save();


};



showDate.onchange=function(){

settings.showDate=this.checked;

save();


};



timezone.onchange=function(){

settings.timezone=this.value;

save();


};





// --------------------
// Themes
// --------------------


function applyTheme(){


let themes={


midnight:[
"#0f172a",
"#1e293b"
],


ocean:[
"#0f2027",
"#203a43"
],


sunset:[
"#ff512f",
"#dd2476"
],


forest:[
"#134e5e",
"#71b280"
],


purple:[
"#41295a",
"#2f0743"
],


clean:[
"#eeeeee",
"#999999"
],


rose:[
"#ff758c",
"#ff7eb3"
],


blue:[
"#2980b9",
"#6dd5fa"
],


gold:[
"#614385",
"#516395"
],


dark:[
"#000000",
"#111111"
]


};



let t =
themes[settings.theme];


document.body.style.background =
`linear-gradient(135deg,${t[0]},${t[1]})`;

}




// --------------------
// Restore Settings
// --------------------


function load(){


theme.value=settings.theme;

font.value=settings.font;

format.value=settings.format;

seconds.checked=settings.seconds;

showDate.checked=settings.showDate;

timezone.value=settings.timezone;


document.body.style.fontFamily=
settings.font;


applyTheme();


}





// --------------------
// Main Loop
// --------------------


setInterval(()=>{

updateClock();

updateTimer();

updateStopwatch();


},1000);




load();

updateClock();

</script>


</body>
</html>
