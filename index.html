<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-type: gradient;
            --bg-color-1: #0f0c29;
            --bg-color-2: #24243e;
            --bg-angle: 199deg;
            
            --accent-type: solid;
            --accent-color-1: #7a7dff;
            --accent-color-2: #9b51e0;
            --accent-angle: 90deg;

            --text-primary: #ffffff;
            --text-muted: #759bdb;
            
            --circle-track: rgba(255, 255, 255, 0.08);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-hover: rgba(255, 255, 255, 0.15);
        }

        body {
            width: 100vw;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Dynamic Background Handling */
        .app-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Circular Progress Ring Container */
        .timer-circle-container {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-ring__circle-bg {
            stroke: var(--circle-track);
            stroke-width: 3;
            fill: transparent;
        }

        .progress-ring__circle {
            stroke: var(--accent-color-1);
            stroke-width: 4;
            fill: transparent;
            stroke-dasharray: 1068; /* 2 * PI * 170 */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.1s linear;
            stroke-linecap: round;
        }

        /* Clock & Timer Text Display */
        .time-display-wrapper {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .time-text {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .time-text .centiseconds {
            font-size: 2.2rem;
            color: var(--text-muted);
        }

        .date-text {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.05em;
        }

        /* Google-style Editable Timer Controls */
        .timer-input-layout {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .unit-field {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .input-row {
            display: flex;
            align-items: center;
        }

        .step-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 4px;
            user-select: none;
            transition: color 0.2s;
        }

        .step-btn:hover {
            color: var(--text-primary);
        }

        .num-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 3.5rem;
            font-weight: 300;
            width: 75px;
            text-align: center;
            font-family: inherit;
            border-bottom: 2px solid transparent;
        }

        .num-input:focus {
            outline: none;
            border-bottom-color: var(--accent-color-1);
        }

        .num-input::-webkit-inner-spin-button, 
        .num-input::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .unit-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .colon-separator {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 18px;
            color: var(--text-primary);
        }

        /* Direct Action Buttons (Play/Pause/Reset/Lap) */
        .action-bar {
            margin-top: 35px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .circle-btn {
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: var(--text-primary);
            background: var(--btn-bg);
        }

        .circle-btn:hover {
            background: var(--btn-hover);
            transform: scale(1.05);
        }

        .circle-btn.secondary {
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
        }

        .circle-btn.primary {
            width: 70px;
            height: 70px;
            font-size: 1.6rem;
            background: var(--accent-color-1);
            color: #ffffff;
        }

        .circle-btn.primary:hover {
            filter: brightness(1.1);
        }

        .circle-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Laps Display */
        .lap-container {
            margin-top: 20px;
            width: 280px;
            max-height: 120px;
            overflow-y: auto;
            border-top: 1px solid var(--circle-track);
            padding-top: 10px;
            z-index: 10;
        }

        .lap-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 4px 0;
        }

        /* Mode Switcher Footer */
        .mode-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: var(--btn-bg);
            padding: 6px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        .mode-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: var(--accent-color-1);
            color: #ffffff;
        }

        /* Settings Toggle Header Button */
        .settings-btn {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--btn-bg);
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: var(--btn-hover);
        }

        /* Auto-Fade Controls on Inactivity */
        .fading-control {
            transition: opacity 0.5s ease;
        }

        .dimmed {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Settings Drawer Panel */
        .settings-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 360px;
            height: 100vh;
            background: #0d0d15;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            overflow-y: auto;
            padding: 24px;
            color: #ffffff;
        }

        .settings-panel.open {
            transform: translateX(0);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .settings-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #759bdb;
            margin: 20px 0 12px 0;
        }

        .segmented-control {
            display: flex;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 15px;
        }

        .segmented-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: #aaaaaa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .segmented-btn.active {
            background: var(--accent-color-1);
            color: #ffffff;
        }

        .color-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-code {
            font-family: monospace;
            font-size: 0.8rem;
            color: #888888;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }

        .slider-row {
            margin-bottom: 15px;
        }

        .slider-row label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color-1);
        }

        .close-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-bg" id="appBg"></div>

    <div class="container">
        <div class="timer-circle-container">
            <svg class="progress-ring">
                <circle class="progress-ring__circle-bg" cx="190" cy="190" r="170"></circle>
                <circle class="progress-ring__circle" id="progressCircle" cx="190" cy="190" r="170"></circle>
            </svg>

            <div class="time-display-wrapper">
                <div id="clockDisplay" style="display: block; text-align: center;">
                    <div class="time-text" id="clockTime">00:00:00</div>
                    <div class="date-text" id="clockDate">Monday, Jan 1</div>
                </div>

                <div id="timerDisplay" style="display: none; text-align: center;">
                    <div class="timer-input-layout" id="timerInputs">
                        <div class="unit-field">
                            <div class="input-row">
                                <button class="step-btn" onclick="adjustTimer('timerHours', -1)">-</button>
                                <input type="number" id="timerHours" class="num-input" value="01" min="0" max="99">
                                <button class="step-btn" onclick="adjustTimer('timerHours', 1)">+</button>
                            </div>
                            <span class="unit-label">HOURS</span>
                        </div>
                        <span class="colon-separator">:</span>
                        <div class="unit-field">
                            <div class="input-row">
                                <button class="step-btn" onclick="adjustTimer('timerMins', -1)">-</button>
                                <input type="number" id="timerMins" class="num-input" value="00" min="0" max="59">
                                <button class="step-btn" onclick="adjustTimer('timerMins', 1)">+</button>
                            </div>
                            <span class="unit-label">MINUTES</span>
                        </div>
                        <span class="colon-separator">:</span>
                        <div class="unit-field">
                            <div class="input-row">
                                <button class="step-btn" onclick="adjustTimer('timerSecs', -1)">-</button>
                                <input type="number" id="timerSecs" class="num-input" value="00" min="0" max="59">
                                <button class="step-btn" onclick="adjustTimer('timerSecs', 1)">+</button>
                            </div>
                            <span class="unit-label">SECONDS</span>
                        </div>
                    </div>
                    <div class="time-text" id="timerRunningText" style="display: none;">00:00:00</div>
                </div>

                <div id="stopwatchDisplay" style="display: none; text-align: center;">
                    <div class="time-text" id="stopwatchText">00:00<span class="centiseconds">.00</span></div>
                </div>
            </div>
        </div>

        <div class="action-bar fading-control" id="actionBar">
            <button class="circle-btn secondary" id="resetBtn" title="Reset">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>

            <button class="circle-btn primary" id="playBtn" title="Start">
                <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>

            <button class="circle-btn secondary" id="lapBtn" title="Lap" style="display: none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
            </button>
        </div>

        <div class="lap-container fading-control" id="lapContainer" style="display: none;"></div>
    </div>

    <div class="mode-controls fading-control" id="modeControls">
        <button class="mode-btn active" onclick="switchMode('clock')">Clock</button>
        <button class="mode-btn" onclick="switchMode('timer')">Timer</button>
        <button class="mode-btn" onclick="switchMode('stopwatch')">Stopwatch</button>
    </div>

    <button class="settings-btn fading-control" id="settingsBtn">⚙️</button>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h3>SETTINGS</h3>
            <button class="close-btn" id="closeSettings">&times;</button>
        </div>

        <div class="settings-section-title">BACKGROUND</div>
        <div class="segmented-control">
            <button class="segmented-btn" id="bgSolidBtn" onclick="setBgType('solid')">Solid</button>
            <button class="segmented-btn active" id="bgGradientBtn" onclick="setBgType('gradient')">Gradient</button>
        </div>
        <div class="color-row">
            <span>From</span>
            <div class="color-picker-wrapper">
                <span class="color-code" id="bgVal1">#0f0c29</span>
                <input type="color" id="bgColor1" value="#0f0c29">
            </div>
        </div>
        <div class="color-row" id="bg2Row">
            <span>To</span>
            <div class="color-picker-wrapper">
                <span class="color-code" id="bgVal2">#24243e</span>
                <input type="color" id="bgColor2" value="#24243e">
            </div>
        </div>
        <div class="slider-row" id="bgAngleRow">
            <label><span>Angle</span><span id="angleVal">199°</span></label>
            <input type="range" id="bgAngle" min="0" max="360" value="199">
        </div>

        <div class="settings-section-title">ACCENT</div>
        <div class="segmented-control">
            <button class="segmented-btn active" id="accentSolidBtn" onclick="setAccentType('solid')">Solid</button>
            <button class="segmented-btn" id="accentGradientBtn" onclick="setAccentType('gradient')">Gradient</button>
        </div>
        <div class="color-row">
            <span>Color</span>
            <div class="color-picker-wrapper">
                <span class="color-code" id="accentVal1">#7a7dff</span>
                <input type="color" id="accentColor1" value="#7a7dff">
            </div>
        </div>

        <div class="settings-section-title">TEXT</div>
        <div class="color-row">
            <span>Primary</span>
            <div class="color-picker-wrapper">
                <span class="color-code" id="textPriVal">#ffffff</span>
                <input type="color" id="textPrimaryColor" value="#ffffff">
            </div>
        </div>
        <div class="color-row">
            <span>Muted</span>
            <div class="color-picker-wrapper">
                <span class="color-code" id="textMutVal">#759bdb</span>
                <input type="color" id="textMutedColor" value="#759bdb">
            </div>
        </div>
    </div>

    <script>
        // State Management
        const state = {
            mode: 'clock',
            
            // Custom Theme State
            theme: {
                bgType: 'gradient',
                bgColor1: '#0f0c29',
                bgColor2: '#24243e',
                bgAngle: 199,
                accentType: 'solid',
                accentColor1: '#7a7dff',
                accentColor2: '#9b51e0',
                textPrimary: '#ffffff',
                textMuted: '#759bdb'
            },

            // Timer State
            timer: {
                running: false,
                totalSecs: 0,
                remainingSecs: 0,
                interval: null
            },

            // Stopwatch State
            stopwatch: {
                running: false,
                startTime: 0,
                elapsedTime: 0,
                interval: null,
                laps: []
            },

            inactivityTimer: null
        };

        // DOM Elements
        const appBg = document.getElementById('appBg');
        const progressCircle = document.getElementById('progressCircle');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const resetBtn = document.getElementById('resetBtn');
        const lapBtn = document.getElementById('lapBtn');
        const lapContainer = document.getElementById('lapContainer');
        
        const svgCircleLength = 1068; // 2 * PI * 170

        // Init App
        function init() {
            loadTheme();
            setupThemeListeners();
            setupInactivityTracker();
            
            // Clock Loop
            setInterval(updateClock, 1000);
            updateClock();

            // Set initial UI Mode
            switchMode('clock');
        }

        // --- Theme Engine ---
        function loadTheme() {
            const saved = localStorage.getItem('custom_clock_theme');
            if (saved) {
                try { Object.assign(state.theme, JSON.parse(saved)); } catch(e){}
            }
            applyThemeUI();
        }

        function saveTheme() {
            localStorage.setItem('custom_clock_theme', JSON.stringify(state.theme));
            applyThemeUI();
        }

        function applyThemeUI() {
            const t = state.theme;

            // Background
            if (t.bgType === 'solid') {
                appBg.style.background = t.bgColor1;
            } else {
                appBg.style.background = `linear-gradient(${t.bgAngle}deg, ${t.bgColor1}, ${t.bgColor2})`;
            }

            // CSS Variables
            document.documentElement.style.setProperty('--accent-color-1', t.accentColor1);
            document.documentElement.style.setProperty('--text-primary', t.textPrimary);
            document.documentElement.style.setProperty('--text-muted', t.textMuted);

            // Settings Input States
            document.getElementById('bgColor1').value = t.bgColor1;
            document.getElementById('bgColor2').value = t.bgColor2;
            document.getElementById('bgAngle').value = t.bgAngle;
            document.getElementById('accentColor1').value = t.accentColor1;
            document.getElementById('textPrimaryColor').value = t.textPrimary;
            document.getElementById('textMutedColor').value = t.textMuted;

            document.getElementById('bgVal1').textContent = t.bgColor1;
            document.getElementById('bgVal2').textContent = t.bgColor2;
            document.getElementById('angleVal').textContent = `${t.bgAngle}°`;
            document.getElementById('accentVal1').textContent = t.accentColor1;
            document.getElementById('textPriVal').textContent = t.textPrimary;
            document.getElementById('textMutVal').textContent = t.textMuted;

            document.getElementById('bgSolidBtn').classList.toggle('active', t.bgType === 'solid');
            document.getElementById('bgGradientBtn').classList.toggle('active', t.bgType === 'gradient');
            document.getElementById('bg2Row').style.display = t.bgType === 'solid' ? 'none' : 'flex';
            document.getElementById('bgAngleRow').style.display = t.bgType === 'solid' ? 'none' : 'block';
        }

        function setBgType(type) {
            state.theme.bgType = type;
            saveTheme();
        }

        function setAccentType(type) {
            state.theme.accentType = type;
            saveTheme();
        }

        function setupThemeListeners() {
            document.getElementById('bgColor1').addEventListener('input', e => { state.theme.bgColor1 = e.target.value; saveTheme(); });
            document.getElementById('bgColor2').addEventListener('input', e => { state.theme.bgColor2 = e.target.value; saveTheme(); });
            document.getElementById('bgAngle').addEventListener('input', e => { state.theme.bgAngle = e.target.value; saveTheme(); });
            document.getElementById('accentColor1').addEventListener('input', e => { state.theme.accentColor1 = e.target.value; saveTheme(); });
            document.getElementById('textPrimaryColor').addEventListener('input', e => { state.theme.textPrimary = e.target.value; saveTheme(); });
            document.getElementById('textMutedColor').addEventListener('input', e => { state.theme.textMuted = e.target.value; saveTheme(); });

            document.getElementById('settingsBtn').addEventListener('click', () => {
                document.getElementById('settingsPanel').classList.add('open');
            });
            document.getElementById('closeSettings').addEventListener('click', () => {
                document.getElementById('settingsPanel').classList.remove('open');
            });
        }

        // --- Mode Switching ---
        function switchMode(mode) {
            state.mode = mode;
            
            // Toggle Mode Buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(mode));
            });

            // Toggle Displays
            document.getElementById('clockDisplay').style.display = mode === 'clock' ? 'block' : 'none';
            document.getElementById('timerDisplay').style.display = mode === 'timer' ? 'block' : 'none';
            document.getElementById('stopwatchDisplay').style.display = mode === 'stopwatch' ? 'block' : 'none';

            // Show/Hide Action Buttons
            document.getElementById('actionBar').style.display = mode === 'clock' ? 'none' : 'flex';
            lapBtn.style.display = mode === 'stopwatch' ? 'flex' : 'none';
            document.getElementById('lapContainer').style.display = (mode === 'stopwatch' && state.stopwatch.laps.length > 0) ? 'block' : 'none';

            // Reset SVG Circle Progress Offset
            progressCircle.style.strokeDashoffset = 0;

            if (mode === 'timer') updateTimerUI();
            if (mode === 'stopwatch') updateStopwatchUI();
        }

        // --- Inactivity Controller (Auto-fade Controls) ---
        function setupInactivityTracker() {
            const resetInactivity = () => {
                document.querySelectorAll('.fading-control').forEach(el => el.classList.remove('dimmed'));
                clearTimeout(state.inactivityTimer);
                
                state.inactivityTimer = setTimeout(() => {
                    // Only dim if settings panel is closed
                    if (!document.getElementById('settingsPanel').classList.contains('open')) {
                        document.querySelectorAll('.fading-control').forEach(el => el.classList.add('dimmed'));
                    }
                }, 5000);
            };

            ['mousemove', 'keydown', 'touchstart', 'click'].forEach(evt => {
                document.addEventListener(evt, resetInactivity);
            });
            resetInactivity();
        }

        // --- Clock Logic ---
        function updateClock() {
            if (state.mode !== 'clock') return;
            const now = new Date();
            const hrs = String(now.getHours() % 12 || 12).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const secs = String(now.getSeconds()).padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'PM' : 'AM';

            document.getElementById('clockTime').textContent = `${hrs}:${mins}:${secs} ${ampm}`;
            document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }

        // --- Google Timer Logic ---
        function adjustTimer(fieldId, delta) {
            const el = document.getElementById(fieldId);
            let val = parseInt(el.value) || 0;
            const max = fieldId === 'timerHours' ? 99 : 59;
            val = Math.min(max, Math.max(0, val + delta));
            el.value = String(val).padStart(2, '0');
        }

        function toggleTimer() {
            if (state.timer.running) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (state.timer.remainingSecs <= 0) {
                const h = parseInt(document.getElementById('timerHours').value) || 0;
                const m = parseInt(document.getElementById('timerMins').value) || 0;
                const s = parseInt(document.getElementById('timerSecs').value) || 0;
                state.timer.totalSecs = h * 3600 + m * 60 + s;
                state.timer.remainingSecs = state.timer.totalSecs;
            }

            if (state.timer.remainingSecs <= 0) return;

            state.timer.running = true;
            document.getElementById('timerInputs').style.display = 'none';
            document.getElementById('timerRunningText').style.display = 'block';
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; // Pause Icon

            state.timer.interval = setInterval(() => {
                state.timer.remainingSecs--;
                updateTimerUI();

                if (state.timer.remainingSecs <= 0) {
                    finishTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            state.timer.running = false;
            clearInterval(state.timer.interval);
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; // Play Icon
        }

        function resetTimer() {
            pauseTimer();
            state.timer.remainingSecs = 0;
            state.timer.totalSecs = 0;
            document.getElementById('timerInputs').style.display = 'flex';
            document.getElementById('timerRunningText').style.display = 'none';
            progressCircle.style.strokeDashoffset = 0;
        }

        function finishTimer() {
            pauseTimer();
            document.getElementById('timerRunningText').textContent = "Time's up!";
            playAlarmSound();
        }

        function updateTimerUI() {
            if (state.timer.remainingSecs <= 0 && !state.timer.running) return;

            const hrs = Math.floor(state.timer.remainingSecs / 3600);
            const mins = Math.floor((state.timer.remainingSecs % 3600) / 60);
            const secs = state.timer.remainingSecs % 60;

            document.getElementById('timerRunningText').textContent = 
                `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

            // Ring progress update
            const fraction = state.timer.remainingSecs / state.timer.totalSecs;
            progressCircle.style.strokeDashoffset = svgCircleLength * (1 - fraction);
        }

        // Web Audio Synthesizer Alarm Sound
        function playAlarmSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(587.33, ctx.currentTime + i * 0.25);
                    osc.connect(ctx.destination);
                    osc.start(ctx.currentTime + i * 0.25);
                    osc.stop(ctx.currentTime + i * 0.25 + 0.15);
                }
            } catch(e) {}
        }

        // --- Precise Stopwatch Logic ---
        function toggleStopwatch() {
            if (state.stopwatch.running) {
                pauseStopwatch();
            } else {
                startStopwatch();
            }
        }

        function startStopwatch() {
            state.stopwatch.running = true;
            state.stopwatch.startTime = Date.now() - state.stopwatch.elapsedTime;
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';

            state.stopwatch.interval = setInterval(() => {
                state.stopwatch.elapsedTime = Date.now() - state.stopwatch.startTime;
                updateStopwatchUI();
            }, 10);
        }

        function pauseStopwatch() {
            state.stopwatch.running = false;
            clearInterval(state.stopwatch.interval);
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        }

        function resetStopwatch() {
            pauseStopwatch();
            state.stopwatch.elapsedTime = 0;
            state.stopwatch.laps = [];
            lapContainer.innerHTML = '';
            lapContainer.style.display = 'none';
            updateStopwatchUI();
        }

        function recordLap() {
            if (!state.stopwatch.running) return;
            const currentTotal = state.stopwatch.elapsedTime;
            const prevTotal = state.stopwatch.laps.length > 0 ? state.stopwatch.laps[0].rawTotal : 0;
            const split = currentTotal - prevTotal;

            state.stopwatch.laps.unshift({
                num: state.stopwatch.laps.length + 1,
                split: formatStopwatchTime(split),
                total: formatStopwatchTime(currentTotal),
                rawTotal: currentTotal
            });

            renderLaps();
        }

        function renderLaps() {
            lapContainer.style.display = 'block';
            lapContainer.innerHTML = state.stopwatch.laps.map(l => `
                <div class="lap-row">
                    <span>Lap ${l.num}</span>
                    <span>${l.split.minSec}.${l.split.cs}</span>
                    <span>${l.total.minSec}.${l.total.cs}</span>
                </div>
            `).join('');
        }

        function formatStopwatchTime(ms) {
            const mins = Math.floor(ms / 60000);
            const secs = Math.floor((ms % 60000) / 1000);
            const cs = Math.floor((ms % 1000) / 10);
            return {
                minSec: `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`,
                cs: String(cs).padStart(2, '0')
            };
        }

        function updateStopwatchUI() {
            const formatted = formatStopwatchTime(state.stopwatch.elapsedTime);
            document.getElementById('stopwatchText').innerHTML = `${formatted.minSec}<span class="centiseconds">.${formatted.cs}</span>`;
            
            // Continuous ring indicator animation during stopwatch
            const secondsProgress = (state.stopwatch.elapsedTime % 60000) / 60000;
            progressCircle.style.strokeDashoffset = svgCircleLength * (1 - secondsProgress);
        }

        // Shared Button Binding
        playBtn.addEventListener('click', () => {
            if (state.mode === 'timer') toggleTimer();
            if (state.mode === 'stopwatch') toggleStopwatch();
        });

        resetBtn.addEventListener('click', () => {
            if (state.mode === 'timer') resetTimer();
            if (state.mode === 'stopwatch') resetStopwatch();
        });

        lapBtn.addEventListener('click', recordLap);

        // Run App
        init();
    </script>
</body>
</html>
